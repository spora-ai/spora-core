services:
  spora:
    build: .
    container_name: spora-app
    restart: always
    command: ["/usr/bin/supervisord", "-c", "/app/supervisord.conf"]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    env_file:
      - .env.local
    environment:
      SPORA_SYNC_MODE: worker
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./storage:/app/storage
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - spora

  mariadb:
    image: mariadb:11
    container_name: spora-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-spora}
      MYSQL_USER: ${DB_USER:-spora}
      MYSQL_PASSWORD: ${DB_PASSWORD:-sporapassword}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - spora

  mercure:
    image: dunglas/mercure:v0.14
    container_name: spora-mercure
    restart: always
    environment:
      # Allow public subscribers (for development; restrict in production)
      MERCURE_DEMO: "true"
      JWT_KEY: ${MERCURE_JWT_SECRET:-change-me-in-production}
      CORS_ALLOWED_ORIGINS: "*"
      PUBLISH_ALLOWED_ORIGINS: "*"
      # Use the same jwt key as mercure for signing
      MERCURE_JWT_KEY: ${MERCURE_JWT_SECRET:-change-me}
    ports:
      - "3000:3000"
    networks:
      - spora

volumes:
  mysql_data:
  caddy_data:
  caddy_config:

networks:
  spora:
    driver: bridge
