{$SERVER_NAME:localhost} {
	root * /app/public

	# Security headers — applied to ALL responses (PHP API + static assets)
	header {
		Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
		X-Content-Type-Options nosniff
		X-Frame-Options DENY
		X-XSS-Protection "1; mode=block"
		Referrer-Policy strict-origin-when-cross-origin
	}

	# Mercure hub
	mercure {
		publisher_jwt {env.SPORA_MERCURE_JWT_KEY} HS256
		subscriber_jwt {env.SPORA_MERCURE_JWT_KEY} HS256
		anonymous
	}

	# Serve static assets from dist/assets/
	@assets {
		path /assets/*
	}
	handle @assets {
		root * /app/public/dist
		file_server
	}

	# SPA fallback - serve index.html for non-API routes (excluding mercure)
	@not-api {
		not {
			path /api/*
			path /.well-known/mercure
		}
	}
	handle @not-api {
		root * /app/public/dist
		try_files {path} index.html
		file_server
	}

	# PHP routes
	php_server
}
