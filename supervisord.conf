[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
loglevel=info

[program:spora-web]
command=frankenphp run --config /app/frankenphp.conf
autostart=true
autorestart=true
startsecs=2
exitcodes=0
stdout_logfile=/dev/stdout
redirect_stderr=true
priority=100

[program:spora-worker]
command=php /app/bin/spora worker:run --daemon
autostart=true
autorestart=true
startsecs=3
exitcodes=0
stdout_logfile=/dev/stdout
redirect_stderr=true
priority=200
