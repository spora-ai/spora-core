sonar.projectKey=spora-ai_Spora
sonar.organization=spora-ai

# Sources and tests
sonar.sources=app,bin,frontend/src
sonar.tests=tests,frontend/tests
sonar.test.inclusions=**/*Test.php,**/*.Test.php,**/*.spec.ts,**/*.spec.tsx
sonar.exclusions=vendor/**,frontend/node_modules/**,frontend/dist/**,storage/**,public/**,public/dist/**,database/**,recipes/**,docker/.env.local.example

# PHP test coverage (clover XML produced by `composer test:coverage:clover`)
sonar.php.coverage.reportPaths=coverage.xml

# JavaScript / TypeScript / Vue test coverage (lcov produced by Vitest)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# .vue goes through the TS analyzer; .ts/.tsx must be TS-only to avoid a language collision
sonar.javascript.file.suffixes=.js,.jsx
sonar.typescript.file.suffixes=.ts,.tsx,.vue
