name: CI

# External actions are pinned to full commit SHAs to prevent supply-chain
# attacks via tag reassignment. Run `gh api repos/OWNER/REPO/git/refs/tags/vN`
# to look up the current SHA when upgrading. Review SonarCloud hotspots
# (rule githubactions:S7637) periodically.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    types: [opened, synchronize, reopened]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Pest (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_mysql, zip
          coverage: none
          tools: composer

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      # Use the parallel runner (--processes=auto on an ubuntu-latest 2-core
      # runner is 2, on a 4-core runner is 4). ~13x faster than serial on
      # the spora-core suite (~290s -> ~25s).
      - name: Run Pest (parallel)
        run: ./vendor/bin/pest --parallel --processes=auto --max-batch-size=50

  static-analysis:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, zip
          coverage: none
          tools: composer

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --no-progress --memory-limit=2G

  coverage:
    name: Test coverage
    needs: [test, static-analysis]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # pcov is ~3-5x faster than xdebug for coverage. The trade-off is
      # that branch/path coverage is not reported (statement + line only),
      # which is fine for spora-core's quality gate (clover XML is consumed
      # by SonarCloud which only needs line coverage).
      - name: Setup PHP with pcov
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, zip
          coverage: pcov
          tools: composer

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      # Reuse the parallel runner in the coverage job too. The coverage
      # driver (pcov) is what makes this expensive per-test; the parallel
      # runner is what makes it fast per-worker. End-to-end this is ~5x
      # faster than the previous xdebug + serial combination.
      - name: Generate clover coverage report
        run: ./vendor/bin/pest --parallel --processes=auto --max-batch-size=50 --coverage-clover=coverage.xml

      - name: Upload coverage.xml
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: error
          retention-days: 7

  sonar:
    name: SonarCloud scan
    needs: coverage
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Download coverage.xml
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: coverage-report
          path: .

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}