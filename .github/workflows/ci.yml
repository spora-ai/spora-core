name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    types: [opened, synchronize, reopened]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - task: php-lint
            command: composer analyse
          - task: php-test
            command: composer test
          - task: frontend-lint
            command: npm run lint
            working-directory: frontend
          - task: frontend-test
            command: npm run test:coverage
            working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        if: matrix.task == 'php-lint' || matrix.task == 'php-test'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, zip
          tools: composer

      - name: PHP Composer install
        if: matrix.task == 'php-lint' || matrix.task == 'php-test'
        run: composer install --no-interaction

      - name: Setup Node
        if: matrix.task == 'frontend-lint' || matrix.task == 'frontend-test'
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install
        if: matrix.task == 'frontend-lint' || matrix.task == 'frontend-test'
        run: npm ci
        working-directory: frontend

      - name: Run ${{ matrix.task }}
        run: ${{ matrix.command }}
        working-directory: ${{ matrix.working-directory || '.' }}

  build-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  php-coverage:
    name: PHP Coverage (clover)
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup PHP with Xdebug
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, zip
          coverage: xdebug
          tools: composer

      - name: Composer install
        run: composer install --no-interaction

      - name: Generate clover coverage report
        run: composer test:coverage:clover

      - name: Upload coverage.xml
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            frontend/coverage/lcov.info
          if-no-files-found: error
          retention-days: 7

  sonar:
    name: SonarCloud scan
    needs: php-coverage
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download coverage.xml
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: .

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}